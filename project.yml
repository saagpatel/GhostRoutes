name: GhostRoutes
options:
  bundleIdPrefix: com.ghostroutes
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

settings:
  base:
    SWIFT_VERSION: "6"
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: "1"

targets:
  GhostRoutes:
    type: application
    platform: iOS
    sources:
      - GhostRoutes
    resources:
      - path: GhostRoutes/Resources
        buildPhase: resources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "Ghost Routes uses your location to discover the places you've stopped visiting."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Ghost Routes uses your location to discover the places you've stopped visiting."
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.ghostroutes.app
    dependencies:
      - package: GRDB

  GhostRoutesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - GhostRoutesTests
    resources:
      - path: GhostRoutesTests/Fixtures
        buildPhase: resources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: GhostRoutes
